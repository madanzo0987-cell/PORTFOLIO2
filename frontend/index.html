<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madan Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: url('https://images.unsplash.com/photo-1493238792000-8113da705763') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

nav h1 { color: red; }

.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 45px;
    color: red;
}

.section {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

/* FORM */
input, textarea, button {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
    width: 80%;
    max-width: 400px;
}

button {
    background: red;
    color: white;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

#status {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>
<div class="overlay">

<nav>
    <h1>MADAN</h1>
</nav>

<div class="hero">
    <h1>Madan Kumar</h1>
    <p>BCA Cloud Computing</p>
</div>

<!-- FEEDBACK -->
<div class="section contact">
    <h2>Feedback</h2>

    <form id="feedbackForm">
        <input type="text" id="name" placeholder="Your Name" required><br>
        <input type="email" id="email" placeholder="Your Email" required><br>
        <textarea id="message" placeholder="Your Feedback" required></textarea><br>
        <button type="submit">Send</button>
        <p id="status"></p>
    </form>

</div>

</div>

<script>
const form = document.getElementById("feedbackForm");
const status = document.getElementById("status");

// 🔴 IMPORTANT: Replace with your real Render backend URL
const API_URL = "https://YOUR-RENDER-URL.onrender.com/users";

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    // ✅ Validation
    if (!name || !email || !message) {
        status.innerText = "⚠️ Please fill all fields";
        status.style.color = "yellow";
        return;
    }

    status.innerText = "⏳ Sending...";
    status.style.color = "white";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, message })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || "Failed");

        status.innerText = "✅ Feedback sent successfully!";
        status.style.color = "lightgreen";

        form.reset();

    } catch (error) {
        console.error(error);
        status.innerText = "❌ Error sending feedback";
        status.style.color = "red";
    }
});
</script>

</body>
</html>
