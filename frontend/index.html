<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madan Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: url('https://images.unsplash.com/photo-1493238792000-8113da705763') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

nav h1 { color: red; }

.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 45px;
    color: red;
}

.section {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

/* FORM */
input, textarea, button {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

button {
    background: red;
    color: white;
}
</style>
</head>

<body>
<div class="overlay">

<nav>
    <h1>MADAN</h1>
</nav>

<div class="hero">
    <h1>Madan Kumar</h1>
    <p>BCA Cloud Computing</p>
</div>

<!-- FEEDBACK -->
<div class="section contact">
    <h2>Feedback</h2>

    <form id="feedbackForm">
        <input type="text" id="name" placeholder="Your Name" required><br>
        <input type="email" id="email" placeholder="Your Email" required><br>
        <textarea id="message" placeholder="Your Feedback"></textarea><br>
        <button type="submit">Send</button>
    </form>

</div>

</div>

<script>
document.getElementById("feedbackForm").addEventListener("submit", sendData);

function sendData(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    // ⚡ Replace with your Render backend URL
    const API_URL = "https://YOUR-RENDER-URL.onrender.com/users";

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, message })
    })
    .then(async res => {
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Something went wrong");
        return data;
    })
    .then(data => {
        alert(data.message || "Feedback sent ✅");
        document.getElementById("feedbackForm").reset();
    })
    .catch(err => {
        console.error(err);
        alert("❌ Error sending feedback");
    });
}
</script>

</body>
</html>
